<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RC Store - Camisetas</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f4f4;
}

header {
  background: #000;
  color: #fff;
  text-align: center;
  padding: 20px;
  font-size: 26px;
  letter-spacing: 2px;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.product {
  background: #fff;
  border-radius: 10px;
  padding: 15px;
  text-align: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.product img {
  width: 100%;
  border-radius: 10px;
}

.product h3 {
  margin: 10px 0;
}

.price {
  color: green;
  font-size: 20px;
  font-weight: bold;
  margin: 10px 0;
}

.btn {
  display: inline-block;
  background: #25D366;
  color: #fff;
  padding: 10px 15px;
  border-radius: 5px;
  text-decoration: none;
  font-weight: bold;
}

.btn:hover {
  background: #1ebe5d;
}

footer {
  background: #000;
  color: #fff;
  text-align: center;
  padding: 15px;
  margin-top: 30px;
}
</style>

</head>

<body>

<header>
  RC STORE 👕
</header>

<div class="container">
  <div class="products">

    <!-- PRODUTO 1 -->
    <div class="product">
      <img src="https://via.placeholder.com/300" alt="Camiseta Preta">
      <h3>Camiseta Preta Premium</h3>
      <div class="price">R$ 79,90</div>
      <a class="btn" href="https://wa.me/5511999999999?text=Olá,%20quero%20comprar%20a%20Camiseta%20Preta%20Premium%20por%20R$%2079,90" target="_blank">
        Comprar no WhatsApp
      </a>
    </div>

    <!-- PRODUTO 2 -->
    <div class="product">
      <img src="https://via.placeholder.com/300" alt="Camiseta Branca">
      <h3>Camiseta Branca Estilosa</h3>
      <div class="price">R$ 69,90</div>
      <a class="btn" href="https://wa.me/5511999999999?text=Olá,%20quero%20comprar%20a%20Camiseta%20Branca%20Estilosa%20por%20R$%2069,90" target="_blank">
        Comprar no WhatsApp
      </a>
    </div>

    <!-- PRODUTO 3 -->
    <div class="product">
      <img src="https://via.placeholder.com/300" alt="Camiseta Estampada">
      <h3>Camiseta Estampada</h3>
      <div class="price">R$ 89,90</div>
      <a class="btn" href="https://wa.me/5511999999999?text=Olá,%20quero%20comprar%20a%20Camiseta%20Estampada%20por%20R$%2089,90" target="_blank">
        Comprar no WhatsApp
      </a>
    </div>

  </div>
</div>

<footer>
  © 2026 RC Store - Todos os direitos reservados
</footer>

</body>
</html>
